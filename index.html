<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>四盤小六壬·詳批</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Serif SC', serif; background-color: #F3F1E9; -webkit-tap-highlight-color: transparent; }
        .active-gong { background-color: rgba(140, 39, 33, 0.05); box-shadow: inset 0 0 10px rgba(140, 39, 33, 0.05); }
        .tab-active { background-color: #8C2721; color: white; }
        .num-card { background: #FFFFFF; border: 2px solid #8C2721; position: relative; }
        .plain-text-box b { color: #8C2721; font-weight: 900; display: inline-block; margin-top: 10px; margin-right: 2px; }
        .clean-output { line-height: 1.8; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        select { appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%238C2721' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 0.8rem center; background-size: 1em; }
    </style>
</head>
<body class="p-3 sm:p-6 text-slate-900 flex flex-col items-center min-h-screen">

    <div class="w-full max-w-md bg-[#FDFBF7] border-[4px] border-slate-800 shadow-2xl p-4 rounded-sm relative">
        <div class="absolute top-0 left-0 w-full h-2 bg-[#8C2721]"></div>
        
        <h1 class="text-center text-3xl font-black text-[#8C2721] mt-2 mb-6 tracking-[0.2em] border-b-2 border-[#8C2721]/10 pb-2">
            四盤小六壬·詳批
        </h1>

        <div class="mb-5">
            <label class="text-[10px] font-bold text-stone-400 ml-1 mb-1 block tracking-widest">諮詢事項</label>
            <input id="eventInput" type="text" class="w-full px-4 py-3 border-2 border-slate-800 outline-none font-bold text-[#8C2721] bg-white shadow-inner rounded-none" placeholder="請輸入占測事項...">
        </div>

        <div class="mb-6">
            <div class="flex border-2 border-slate-800 rounded-sm overflow-hidden mb-4 shadow-sm">
                <button onclick="setMode('date')" data-mode="date" class="mode-btn flex-1 py-3 text-xs font-black tab-active">自動日期</button>
                <button onclick="setMode('number')" data-mode="number" class="mode-btn flex-1 py-3 text-xs font-black bg-stone-50 text-slate-400 border-l-2 border-slate-800">數理起課</button>
                <button onclick="setMode('text')" data-mode="text" class="mode-btn flex-1 py-3 text-xs font-black bg-stone-50 text-slate-400 border-l-2 border-slate-800">文字感應</button>
            </div>
            <div id="inputArea" class="p-6 bg-white border-2 border-slate-800 shadow-inner min-h-[120px] flex flex-col justify-center"></div>
        </div>

        <div class="grid grid-cols-3 border-2 border-slate-800 bg-white mb-6 shadow-inner" id="nineGrid"></div>

        <div class="flex flex-col gap-3">
            <button onclick="calculate()" class="w-full bg-[#8C2721] text-white py-4 rounded-none font-black tracking-[0.8em] text-xl shadow-lg active:translate-y-0.5 transition-all">啟卦</button>
            <button id="aiBtn" onclick="generateInterpretation()" class="hidden w-full border-2 border-[#8C2721] text-[#8C2721] py-3 rounded-none font-black flex items-center justify-center gap-2 hover:bg-[#8C2721] hover:text-white transition-all">
                <span id="aiBtnText">📜 獲取大白話詳解</span>
            </button>
            <button onclick="resetApiKey()" class="text-[10px] text-stone-400 underline mt-2 text-center">重置 API Key</button>
        </div>

        <div id="analysisArea" class="hidden mt-6 space-y-5 pb-8">
            <div class="p-5 bg-white border-2 border-slate-800 rounded-none shadow-md">
                <div class="flex items-center gap-2 mb-3 border-b border-slate-100 pb-2">
                    <span class="text-xl">📢</span>
                    <h3 class="font-black text-slate-800 text-lg">大白話解析</h3>
                </div>
                <div id="plainSpeechContent" class="plain-text-box text-slate-700 leading-relaxed text-[15px] clean-output"></div>
            </div>

            <div class="p-5 bg-[#F9F7F0] border-l-[6px] border-[#8C2721] shadow-inner">
                <div class="flex items-center justify-between mb-3 border-b border-stone-200 pb-2">
                    <div class="flex items-center gap-2">
                        <span class="w-1.5 h-5 bg-[#8C2721]"></span>
                        <h3 class="font-black text-[#8C2721] text-md">專業大師詳批</h3>
                    </div>
                    <span id="eventTag" class="text-[10px] font-bold bg-[#8C2721] text-white px-2 py-0.5"></span>
                </div>
                <div id="analysisContent" class="text-slate-800 leading-relaxed whitespace-pre-wrap font-serif text-[14px] clean-output"></div>
            </div>
        </div>
    </div>

    <script>
        // --- API KEY 逻辑开始 ---
        let apiKey = localStorage.getItem('gemini_api_key') || "";

        function checkApiKey() {
            if (!apiKey) {
                const userKey = prompt("檢測到尚未配置 API Key。\n請輸入您的 Gemini API Key (將安全地儲存在本地瀏覽器中)：");
                if (userKey && userKey.trim().length > 10) {
                    apiKey = userKey.trim();
                    localStorage.setItem('gemini_api_key', apiKey);
                    alert("API Key 已成功儲存！");
                } else {
                    alert("未輸入有效的 Key，AI 功能將無法使用。");
                }
            }
        }

        function resetApiKey() {
            if(confirm("確定要清除並更換 API Key 嗎？")) {
                localStorage.removeItem('gemini_api_key');
                apiKey = "";
                checkApiKey();
            }
        }
        // --- API KEY 逻辑结束 ---

        let currentMode = 'date';
        let calculationResult = null;

        const diZhiBase = [
            { name: "子", range: "23-01", wuxing: "水" }, { name: "丑", range: "01-03", wuxing: "土" },
            { name: "寅", range: "03-05", wuxing: "木" }, { name: "卯", range: "05-07", wuxing: "木" },
            { name: "辰", range: "07-09", wuxing: "土" },
