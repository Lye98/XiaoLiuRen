<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>四盤小六壬·詳批</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Serif SC', serif; background-color: #F3F1E9; -webkit-tap-highlight-color: transparent; }
        .active-gong { background-color: rgba(140, 39, 33, 0.05); box-shadow: inset 0 0 10px rgba(140, 39, 33, 0.05); }
        .tab-active { background-color: #8C2721; color: white; }
        .num-card { background: #FFFFFF; border: 2px solid #8C2721; position: relative; }
        .plain-text-box b { color: #8C2721; font-weight: 900; display: inline-block; margin-top: 10px; margin-right: 2px; }
        .clean-output { line-height: 1.8; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        select { appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%238C2721' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 0.8rem center; background-size: 1em; }
    </style>
</head>
<body class="p-3 sm:p-6 text-slate-900 flex flex-col items-center min-h-screen">

    <div class="w-full max-w-md bg-[#FDFBF7] border-[4px] border-slate-800 shadow-2xl p-4 rounded-sm relative">
        <div class="absolute top-0 left-0 w-full h-2 bg-[#8C2721]"></div>
        
        <h1 class="text-center text-3xl font-black text-[#8C2721] mt-2 mb-6 tracking-[0.2em] border-b-2 border-[#8C2721]/10 pb-2">
            四盤小六壬·詳批
        </h1>

        <div class="mb-5">
            <label class="text-[10px] font-bold text-stone-400 ml-1 mb-1 block tracking-widest">諮詢事項</label>
            <input id="eventInput" type="text" class="w-full px-4 py-3 border-2 border-slate-800 outline-none font-bold text-[#8C2721] bg-white shadow-inner rounded-none" placeholder="請輸入占測事項...">
        </div>

        <div class="mb-6">
            <div class="flex border-2 border-slate-800 rounded-sm overflow-hidden mb-4 shadow-sm">
                <button onclick="setMode('date')" data-mode="date" class="mode-btn flex-1 py-3 text-xs font-black tab-active">自動日期</button>
                <button onclick="setMode('number')" data-mode="number" class="mode-btn flex-1 py-3 text-xs font-black bg-stone-50 text-slate-400 border-l-2 border-slate-800">數理起課</button>
                <button onclick="setMode('text')" data-mode="text" class="mode-btn flex-1 py-3 text-xs font-black bg-stone-50 text-slate-400 border-l-2 border-slate-800">文字感應</button>
            </div>
            <div id="inputArea" class="p-6 bg-white border-2 border-slate-800 shadow-inner min-h-[120px] flex flex-col justify-center"></div>
        </div>

        <div class="grid grid-cols-3 border-2 border-slate-800 bg-white mb-6 shadow-inner" id="nineGrid"></div>

        <div class="flex flex-col gap-3">
            <button onclick="calculate()" class="w-full bg-[#8C2721] text-white py-4 rounded-none font-black tracking-[0.8em] text-xl shadow-lg active:translate-y-0.5 transition-all">啟卦</button>
            <button id="aiBtn" onclick="generateInterpretation()" class="hidden w-full border-2 border-[#8C2721] text-[#8C2721] py-3 rounded-none font-black flex items-center justify-center gap-2 hover:bg-[#8C2721] hover:text-white transition-all">
                <span id="aiBtnText">📜 獲取大白話詳解</span>
            </button>
            <button onclick="resetKey()" class="text-[10px] text-stone-400 underline mt-2">更換 API Key</button>
        </div>

        <div id="analysisArea" class="hidden mt-6 space-y-5 pb-8">
            <div class="p-5 bg-white border-2 border-slate-800 rounded-none shadow-md">
                <div class="flex items-center gap-2 mb-3 border-b border-slate-100 pb-2">
                    <span class="text-xl">📢</span>
                    <h3 class="font-black text-slate-800 text-lg">大白話解析</h3>
                </div>
                <div id="plainSpeechContent" class="plain-text-box text-slate-700 leading-relaxed text-[15px] clean-output"></div>
            </div>

            <div class="p-5 bg-[#F9F7F0] border-l-[6px] border-[#8C2721] shadow-inner">
                <div class="flex items-center justify-between mb-3 border-b border-stone-200 pb-2">
                    <div class="flex items-center gap-2">
                        <span class="w-1.5 h-5 bg-[#8C2721]"></span>
                        <h3 class="font-black text-[#8C2721] text-md">專業大師詳批</h3>
                    </div>
                    <span id="eventTag" class="text-[10px] font-bold bg-[#8C2721] text-white px-2 py-0.5"></span>
                </div>
                <div id="analysisContent" class="text-slate-800 leading-relaxed whitespace-pre-wrap font-serif text-[14px] clean-output"></div>
            </div>
        </div>
    </div>

    <script>
        // --- API KEY 存储逻辑 ---
        let apiKey = localStorage.getItem('GEMINI_API_KEY') || "";

        function checkKey() {
            if (!apiKey) {
                const input = prompt("請輸入您的 Gemini API Key：\n(此 Key 將保存在瀏覽器本地，不會被公開)");
                if (input && input.trim()) {
                    apiKey = input.trim();
                    localStorage.setItem('GEMINI_API_KEY', apiKey);
                    return true;
                }
                return false;
            }
            return true;
        }

        function resetKey() {
            localStorage.removeItem('GEMINI_API_KEY');
            apiKey = "";
            checkKey();
        }

        let currentMode = 'date';
        let calculationResult = null;

        const diZhiBase = [
            { name: "子", range: "23-01", wuxing: "水" }, { name: "丑", range: "01-03", wuxing: "土" },
            { name: "寅", range: "03-05", wuxing: "木" }, { name: "卯", range: "05-07", wuxing: "木" },
            { name: "辰", range: "07-09", wuxing: "土" }, { name: "巳", range: "09-11", wuxing: "火" },
            { name: "午", range: "11-13", wuxing: "火" }, { name: "未", range: "13-15", wuxing: "土" },
            { name: "申", range: "15-17", wuxing: "金" }, { name: "酉", range: "17-19", wuxing: "金" },
            { name: "戌", range: "19-21", wuxing: "土" }, { name: "亥", range: "21-23", wuxing: "水" }
        ];

        const gongNames = ["大安", "留連", "速喜", "赤口", "小吉", "空亡"];
        const gridLayout = [
            { name: '留連', index: 1 }, { name: '速喜', index: 2 }, { name: '赤口', index: 3 },
            { name: '大安', index: 0 }, { name: '空亡', index: 5 }, { name: '小吉', index: 4 }
        ];

        const fiveStars = ["木星", "火星", "土星", "金星", "水星", "天空"];
        const sixGods = ["青龍", "朱雀", "勾陳", "騰蛇", "白虎", "玄武"];

        function initGrid() {
            const grid = document.getElementById('nineGrid');
            grid.innerHTML = '';
            gridLayout.forEach((item) => {
                const div = document.createElement('div');
                div.className = `h-40 border border-stone-100 relative flex flex-col items-center justify-between py-2 px-1`;
                div.id = `gong-${item.index}`;
                div.innerHTML = `
                    <div class="w-full flex justify-between px-1.5 pt-0.5">
                        <span class="six-god text-[10px] font-black text-[#8C2721] tracking-tighter"></span>
                        <span class="star text-[10px] font-black text-blue-700 tracking-tighter"></span>
                    </div>
                    <div class="nodes-container flex flex-col gap-1 w-full items-center"></div>
                    <div class="text-xl font-black mt-auto pb-1 text-stone-200 text-center w-full">${item.name}</div>
                    <div class="dz-text absolute bottom-0.5 right-1 text-[8px] font-bold text-stone-300"></div>
                `;
                grid.appendChild(div);
            });
        }

        function getLunarInfo() {
            const date = new Date();
            const formatter = new Intl.DateTimeFormat('zh-u-ca-chinese', { month: 'numeric', day: 'numeric' });
            const parts = formatter.formatToParts(date);
            const m = parseInt(parts.find(p => p.type === 'month').value);
            const d = parseInt(parts.find(p => p.type === 'day').value);
            const hIdx = Math.floor(((date.getHours() + 1) % 24) / 2);
            return { month: m, day: d, hIdx: hIdx, text: `農曆${m}月${d}日 ${diZhiBase[hIdx].name}時(${diZhiBase[hIdx].range})` };
        }

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => {
                const isActive = btn.dataset.mode === mode;
                btn.className = `mode-btn flex-1 py-3 text-xs font-black ${isActive ? 'tab-active' : 'bg-stone-50 text-slate-400 border-l-2 border-slate-800'}`;
            });
            const inputArea = document.getElementById('inputArea');
            if (mode === 'date') {
                inputArea.innerHTML = `<div id="dateDisplay" class="text-center font-black text-[#8C2721] text-lg tracking-wider">${getLunarInfo().text}</div>`;
            } else if (mode === 'number') {
                inputArea.innerHTML = `
                    <div class="flex flex-col gap-4">
                        <div class="grid grid-cols-2 gap-4">
                            <div class="num-card flex flex-col p-2 text-center">
                                <span class="text-[10px] font-bold text-stone-400 mb-1">農曆月</span>
                                <input id="in_m" type="number" class="w-full bg-transparent text-center text-xl font-black text-[#8C2721] outline-none" placeholder="月">
                            </div>
                            <div class="num-card flex flex-col p-2 text-center">
                                <span class="text-[10px] font-bold text-stone-400 mb-1">農曆日</span>
                                <input id="in_d" type="number" class="w-full bg-transparent text-center text-xl font-black text-[#8C2721] outline-none" placeholder="日">
                            </div>
                        </div>
                        <div class="num-card p-1">
                            <select id="in_h" class="w-full bg-transparent py-2 px-3 font-black text-[#8C2721] text-sm outline-none">
                                ${diZhiBase.map((dz, i) => `<option value="${i}">${dz.name}時 (${dz.range})</option>`).join('')}
                            </select>
                        </div>
                    </div>
                `;
            } else {
                inputArea.innerHTML = `<input id="in_txt" class="w-full text-center border-b-2 border-slate-800 outline-none text-lg font-black bg-transparent text-[#8C2721] py-2" placeholder="輸入靈動詞感應">`;
            }
        }

        function getLiuQin(selfWx, targetWx, selfName, targetName, isFirstEarth) {
            if (selfName === targetName) return "自身";
            if (selfWx !== '土' && targetWx === '土' && isFirstEarth) return "兄弟";
            const relations = {
                "木": { "木": "兄弟", "火": "子孫", "土": "妻財", "金": "官鬼", "水": "父母" },
                "火": { "火": "兄弟", "土": "子孫", "金": "妻財", "水": "官鬼", "木": "父母" },
                "土": { "土": "兄弟", "金": "子孫", "水": "妻財", "木": "官鬼", "火": "父母" },
                "金": { "金": "兄弟", "水": "子孫", "木": "妻財", "火": "官鬼", "土": "父母" },
                "水": { "水": "兄弟", "木": "子孫", "火": "妻財", "土": "官鬼", "金": "父母" }
            };
            return relations[selfWx]?.[targetWx] || "-";
        }

        function calculate() {
            let nums = [];
            let hIdx = 0;
            if (currentMode === 'date') {
                const lunar = getLunarInfo();
                hIdx = lunar.hIdx;
                nums = [lunar.month, lunar.day, hIdx + 1];
            } else if (currentMode === 'number') {
                hIdx = parseInt(document.getElementById('in_h').value) || 0;
                nums = [parseInt(document.getElementById('in_m').value) || 1, parseInt(document.getElementById('in_d').value) || 1, hIdx + 1];
            } else {
                const txt = (document.getElementById('in_txt').value || "感應");
                nums = txt.split('').slice(0,3).map(c => (c.charCodeAt(0) % 12) + 1);
                while(nums.length < 3) nums.push(1);
                hIdx = (nums[2] - 1) % 12;
            }

            const labels = ["月", "日", "時"];
            let pathInfo = [];
            let currentPos = 0;
            nums.forEach((n, i) => {
                currentPos = (currentPos + n - 1) % 6;
                pathInfo.push({ pos: currentPos, label: labels[i] });
            });

            const shiPos = pathInfo[2].pos;
            const shiDzInfo = diZhiBase[hIdx];
            const activeGroup = [0,2,4,6,8,10].includes(hIdx) ? 
                [{name:"子",wuxing:"水"},{name:"寅",wuxing:"木"},{name:"辰",wuxing:"土"},{name:"午",wuxing:"火"},{name:"申",wuxing:"金"},{name:"戌",wuxing:"土"}] :
                [{name:"丑",wuxing:"土"},{name:"卯",wuxing:"木"},{name:"巳",wuxing:"火"},{name:"未",wuxing:"土"},{name:"酉",wuxing:"金"},{name:"亥",wuxing:"水"}];
            
            const startIdxInGroup = activeGroup.findIndex(d => d.name === shiDzInfo.name);

            initGrid();
            let earthCount = 0;
            for(let offset=0; offset<6; offset++) {
                const gIdx = (shiPos + offset) % 6;
                const dz = activeGroup[(startIdxInGroup + offset) % 6];
                const gongEl = document.getElementById(`gong-${gIdx}`);
                let isFirstEarth = false;
                if(dz.wuxing === '土') { earthCount++; if(earthCount === 1) isFirstEarth = true; }
                const lq = getLiuQin(shiDzInfo.wuxing, dz.wuxing, shiDzInfo.name, dz.name, isFirstEarth);
                gongEl.querySelector('.six-god').innerText = sixGods[(gIdx + nums[2]) % 6];
                gongEl.querySelector('.star').innerText = fiveStars[(gIdx - shiPos + 6) % 6];
                gongEl.querySelector('.dz-text').innerText = dz.name + dz.wuxing;

                const nodes = pathInfo.filter(p => p.pos === gIdx);
                const container = gongEl.querySelector('.nodes-container');
                if(nodes.length > 0) {
                    gongEl.classList.add('active-gong');
                    const nameEl = gongEl.querySelector('.text-xl');
                    nameEl.classList.replace('text-stone-200', 'text-[#8C2721]');
                    nodes.forEach(node => {
                        container.innerHTML += `<div class="bg-white px-1.5 py-0.5 border border-[#8C2721]/30 shadow-sm rounded-sm"><span class="text-[9px] font-black text-[#8C2721]">${node.label}·${lq}</span></div>`;
                    });
                } else {
                    container.innerHTML = `<span class="text-[9px] font-bold text-stone-300 italic opacity-60">${lq}</span>`;
                }
            }

            calculationResult = {
                event: document.getElementById('eventInput').value || "隨機感應",
                summary: pathInfo.map(p => gongNames[p.pos]).join('→'),
                finalGong: gongNames[shiPos],
                timeText: `${shiDzInfo.name}時 (${shiDzInfo.range})`
            };

            document.getElementById('aiBtn').classList.remove('hidden');
            document.getElementById('analysisArea').classList.add('hidden');
        }

        async function generateInterpretation() {
            if(!checkKey()) return;
            if(!calculationResult) return;

            const btnText = document.getElementById('aiBtnText');
            btnText.innerHTML = `<span class="animate-pulse">正在參悟天機...</span>`;

            const prompt = `
                起課事項：${calculationResult.event}
                時間：${calculationResult.timeText}
                路徑：${calculationResult.summary}
                落宮：${calculationResult.finalGong}
                
                請給出深度解析。要求如下：
                1. 嚴禁輸出任何 Markdown 符號。
                2. 禁止輸出數字編號。
                3. [大白話解析] 部分：
                   - 包含 總結、預判、建議 三個版塊。
                   - 標題格式必須為「總結：」、「預判：」、「建議：」。
                4. [專業大師詳批] 部分：五行分析。
            `;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        systemInstruction: { parts: [{ text: "你是小六壬大師。禁止使用Markdown符號，禁止數字編號，直接換行輸出文字內容。" }] }
                    })
                });
                
                const data = await response.json();
                if(data.error) throw new Error(data.error.message);

                const rawText = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
                let cleanText = rawText.replace(/[#*_\-`\[\]]/g, '').trim();
                const sections = cleanText.split('專業大師詳批');
                const plainPart = sections[0].replace('大白話解析', '').trim();
                const profPart = sections[1] || "大師正在組織預感...";

                document.getElementById('analysisArea').classList.remove('hidden');
                document.getElementById('eventTag').innerText = calculationResult.event;
                
                const keywords = ["總結", "預判", "建議"];
                let formattedPlain = plainPart;
                keywords.forEach(k => {
                    const regex = new RegExp(`${k}\\s*[:：]`, 'g');
                    formattedPlain = formattedPlain.replace(regex, `<b>${k}：</b>`);
                });

                document.getElementById('plainSpeechContent').innerHTML = formattedPlain.replace(/\n/g, '<br>');
                document.getElementById('analysisContent').innerText = profPart.trim();
                document.getElementById('analysisArea').scrollIntoView({ behavior: 'smooth' });
            } catch (err) {
                console.error(err);
                alert("感應失敗，請檢測 API Key 是否正確或網路狀態。");
            } finally {
                btnText.innerText = "📜 獲取大白話詳解";
            }
        }

        window.onload = () => {
            initGrid();
            setMode('date');
            // 延迟一秒检测Key，避免影响页面首屏加载
            setTimeout(checkKey, 1000);
            setInterval(() => {
                if(currentMode === 'date') {
                    const el = document.getElementById('dateDisplay');
                    if(el) el.innerText = getLunarInfo().text;
                }
            }, 1000);
        };
    </script>
</body>
</html>
